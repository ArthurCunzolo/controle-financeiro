<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FinControl — Sistema profissional de controle financeiro pessoal. Gerencie contas, pagamentos, renegociações e visualize suas finanças com dashboards interativos.">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FinControl — Controle Financeiro Pessoal</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
    
    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- ==================== LOGIN SCREEN ==================== -->
    <div class="login-screen active" id="login-screen">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="login-logo">💰</div>
                    <h1>FinControl</h1>
                    <p class="login-subtitle" id="login-subtitle">Personal Financial Assistant</p>
                </div>
                <div class="login-lang-switch" id="login-lang-switch">
                    <!-- Language selector rendered by JS -->
                </div>
                <form class="login-form" onsubmit="Auth.handleLogin(event)">
                    <div class="form-group">
                        <label id="login-label-user">Username</label>
                        <input type="text" id="login-username" placeholder="Enter your username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label id="login-label-pass">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
                    </div>
                    <div class="login-error" id="login-error"></div>
                    <button type="submit" class="btn btn-primary login-btn" id="login-submit">Sign In</button>
                </form>
                <div class="login-footer">
                    <p id="login-footer-text">Secure client-side financial management</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== MAIN APPLICATION ==================== -->
    <div class="app-container hidden" id="app-container">
        <!-- Mobile Sidebar Toggle -->
        <button class="sidebar-toggle" id="sidebar-toggle">☰</button>

        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <!-- Rendered by sidebar.js -->
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="page-header">
                <h2 id="page-title">📊 Dashboard</h2>
                <div class="header-actions">
                    <div class="search-input" style="width: 220px;">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="global-search" placeholder="Quick search..." onkeyup="App.globalSearch && App.globalSearch(this.value)">
                    </div>
                </div>
            </header>
            <div class="page-content" id="page-content">
                <!-- Module content rendered dynamically -->
                <div class="text-center" style="padding: 60px 20px; color: var(--text-secondary);">
                    <div style="font-size: 48px; margin-bottom: 16px;">⏳</div>
                    <p>Loading your financial data...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts — loaded in dependency order -->
    <script src="js/i18n.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="components/modals.js"></script>
    <script src="components/sidebar.js"></script>
    <script src="js/bills.js"></script>
    <script src="js/payments.js"></script>
    <script src="js/debts.js"></script>
    <script src="js/incomes.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
